<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A/S 기사 모바일 — ColdStorage Master</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap');
body{margin:0;background:#f4f5f7;font-family:'Pretendard',-apple-system,sans-serif}
.lucide{width:16px;height:16px;display:inline-block;vertical-align:middle}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
// Pretty SF-icon-ish glyphs using emoji-free inline SVG
const Icon = ({ d, c='#0f172a', s=18 }) => (
  <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
    <path d={d}/>

);
const I = {
  search:'M11 19a8 8 0 1 0 0-16 8 8 0 0 0 0 16zM21 21l-4.3-4.3',
  bell:'M15 17h5l-1.4-1.4A2 2 0 0 1 18 14.2V11a6 6 0 1 0-12 0v3.2c0 .53-.21 1.04-.59 1.41L4 17h5m6 0v1a3 3 0 1 1-6 0v-1m6 0H9',
  map:'M9 20l-5.4 1.8a1 1 0 0 1-1.3-1.3L4 15M9 20l6-2 6 2M9 20V8m6 12V8m0 0l6-2v12M15 8L9 6M9 8V6',
  phone:'M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.37 1.9.72 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.35 1.85.59 2.81.72A2 2 0 0 1 22 16.92z',

  chevL:'M15 18l-6-6 6-6',
  camera:'M23 19V8a2 2 0 0 0-2-2h-3.17l-1.83-2H8L6.17 6H3a2 2 0 0 0-2 2v11a2 2 0 0 0 2 2h18a2 2 0 0 0 2-2zM12 17.5a4 4 0 1 1 0-8 4 4 0 0 1 0 8z',
  pen:'M12 20h9M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z',
  alert:'M12 9v4m0 4h.01M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z',
  car:'M5 17H3v-5l2-5h14l2 5v5h-2M5 17a2 2 0 1 0 4 0 2 2 0 0 0-4 0zM15 17a2 2 0 1 0 4 0 2 2 0 0 0-4 0z',
  pkg:'M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16zM3.27 6.96L12 12.01l8.73-5.05M12 22.08V12',
  list:'M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01',
  thermo:'M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z',
  sign:'M3 17l6-6 4 4 8-8m0 0V3h-4',
  user:'M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2M12 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8z',
  arrow:'M5 12h14M12 5l7 7-7 7',
};

// ─── Job List screen ─────────────────────────────────────
function JobList(){
  const jobs = [
    {tag:'긴급', tagC:'#dc2626', tagBg:'#fee2e2', name:'동해수산', addr:'강원 강릉시 해안로 456', time:'14:00 도착', issue:'유닛쿨러 제상 불량', dist:'12km', state:'in'},
    {tag:'정기점검', tagC:'#1e40af', tagBg:'#dbeafe', name:'푸드원 유통 본사', addr:'경기 오산시 경기대로 123', time:'16:30', issue:'분기 점검 · 누설 검사', dist:'6km', state:'next'},
    {tag:'A/S', tagC:'#92400e', tagBg:'#fef3c7', name:'양평종합주방', addr:'경기 양평군 양평읍 시민로 12', time:'내일 09:00', issue:'엑셀쿨러 히터선 교체', dist:'34km', state:'tmr'},
  ];
  return (
    <div style={{padding:'70px 16px 30px',fontFamily:'Pretendard,-apple-system,sans-serif',color:'#0f172a'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
        <div>
          <div style={{fontSize:11,fontWeight:700,color:'#64748b',letterSpacing:'.05em',textTransform:'uppercase'}}>5월 11일 (월)</div>
          <div style={{fontSize:22,fontWeight:800,letterSpacing:'-.01em',marginTop:2}}>오늘 작업 3건</div>
        </div>
        <div style={{position:'relative'}}>
          <div style={{width:38,height:38,borderRadius:'50%',background:'#0f172a',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:13}}>김</div>
          <div style={{position:'absolute',top:0,right:0,width:10,height:10,borderRadius:'50%',background:'#ef4444',border:'2px solid #f2f2f7'}}/>
        </div>
      </div>

      <div style={{display:'flex',gap:6,marginBottom:14}}>
        {['오늘 3','내일 2','이번주 7'].map((t,i)=>(
          <div key={i} style={{padding:'6px 12px',borderRadius:99,background:i===0?'#0f172a':'#fff',color:i===0?'#fff':'#64748b',fontSize:12,fontWeight:600,border:'1px solid '+(i===0?'#0f172a':'#e5e7eb')}}>{t}</div>
        ))}
      </div>

      {jobs.map((j,i)=>(
        <div key={i} style={{background:'#fff',borderRadius:14,padding:'12px 14px',marginBottom:8,border:'1px solid #e5e7eb',boxShadow:'0 1px 2px rgba(15,23,42,.03)'}}>
          <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:6}}>
            <span style={{fontSize:10,fontWeight:800,padding:'2px 7px',borderRadius:4,background:j.tagBg,color:j.tagC,letterSpacing:'.04em'}}>{j.tag}</span>
            <span style={{fontSize:11,color:'#64748b',marginLeft:'auto',fontWeight:600,display:'flex',alignItems:'center',gap:3}}>
              <Icon d={I.clock} c="#64748b" s={11}/>{j.time}
            </span>
          </div>
          <div style={{fontSize:15,fontWeight:700,letterSpacing:'-.01em'}}>{j.name}</div>
          <div style={{fontSize:12,color:'#475569',marginTop:3,display:'flex',alignItems:'center',gap:5}}>
            <Icon d={I.alert} c="#94a3b8" s={12}/>{j.issue}
          </div>
          <div style={{display:'flex',alignItems:'center',marginTop:8,paddingTop:8,borderTop:'1px solid #f1f5f9'}}>
            <span style={{fontSize:11,color:'#64748b',display:'flex',alignItems:'center',gap:4}}>
              <Icon d={I.map} c="#64748b" s={11}/>{j.dist} · {j.addr.split(' ').slice(0,2).join(' ')}
            </span>
            <div style={{marginLeft:'auto',display:'flex',gap:5}}>
              <button style={{width:30,height:30,borderRadius:8,background:'#f1f5f9',border:'none',display:'flex',alignItems:'center',justifyContent:'center'}}>
                <Icon d={I.phone} c="#475569" s={14}/>
              </button>
              <button style={{height:30,padding:'0 12px',borderRadius:8,background:i===0?'#dc2626':'#1e40af',color:'#fff',border:'none',fontSize:11.5,fontWeight:700,display:'flex',alignItems:'center',gap:4}}>
                {i===0?'출발':'경로'} <Icon d={I.arrow} c="#fff" s={11}/>
              </button>
            </div>
          </div>
        </div>
      ))}

      <div style={{marginTop:14,padding:'10px 12px',background:'#0b1220',color:'#fff',borderRadius:12,display:'flex',alignItems:'center',gap:10}}>
        <div style={{width:32,height:32,borderRadius:'50%',background:'rgba(255,255,255,.1)',display:'flex',alignItems:'center',justifyContent:'center'}}>
          <Icon d={I.car} c="#fff" s={16}/>
        </div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:10,color:'#94a3b8',fontWeight:600,letterSpacing:'.04em',textTransform:'uppercase'}}>현재 위치</div>
          <div style={{fontSize:12,fontWeight:600}}>강릉방향 영동고속도로 · 52분 후 도착</div>
        </div>
      </div>
    </div>
  );
}

// ─── A/S Detail screen ─────────────────────────────────────
function JobDetail(){
  return (
    <div style={{padding:'56px 0 30px',fontFamily:'Pretendard,sans-serif',color:'#0f172a'}}>
      <div style={{padding:'4px 16px 12px',display:'flex',alignItems:'center',gap:8}}>
        <button style={{width:32,height:32,borderRadius:8,background:'rgba(255,255,255,.6)',backdropFilter:'blur(20px)',border:'1px solid rgba(0,0,0,.08)',display:'flex',alignItems:'center',justifyContent:'center'}}>
          <Icon d={I.chevL} c="#0f172a" s={16}/>
        </button>
        <span style={{fontSize:13,fontWeight:700,marginLeft:6}}>A/S 상세</span>
        <span style={{marginLeft:'auto',fontSize:10,fontWeight:800,padding:'3px 8px',borderRadius:4,background:'#fee2e2',color:'#991b1b'}}>긴급</span>
      </div>

      <div style={{margin:'0 16px',background:'#fff',borderRadius:14,padding:'14px',border:'1px solid #e5e7eb'}}>
        <div style={{fontSize:10,fontWeight:700,color:'#64748b',letterSpacing:'.04em',textTransform:'uppercase'}}>접수번호 AS-26/05/11-1</div>
        <div style={{fontSize:18,fontWeight:800,marginTop:3,letterSpacing:'-.01em'}}>동해수산</div>
        <div style={{fontSize:12,color:'#475569',marginTop:2}}>대표 이영희 · 거래 8회 · 마지막 시공 2024.11</div>

        <div style={{marginTop:12,padding:'10px 12px',background:'#fef2f2',border:'1px solid #fecaca',borderRadius:8}}>
          <div style={{fontSize:11,fontWeight:700,color:'#991b1b',letterSpacing:'.04em',textTransform:'uppercase',display:'flex',alignItems:'center',gap:5}}>
            <Icon d={I.alert} c="#991b1b" s={12}/>증상
          </div>
          <div style={{fontSize:13,fontWeight:600,marginTop:4,color:'#0f172a',lineHeight:1.5}}>유닛쿨러 제상 사이클 작동 안 함. 성에가 두껍게 끼고 냉기 약함. 어제 오후부터.</div>
        </div>

        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginTop:12}}>
          <button style={{height:38,borderRadius:8,background:'#0f172a',color:'#fff',border:'none',fontSize:12,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',gap:5}}>
            <Icon d={I.phone} c="#fff" s={13}/>전화
          </button>
          <button style={{height:38,borderRadius:8,background:'#fff',color:'#0f172a',border:'1px solid #e5e7eb',fontSize:12,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',gap:5}}>
            <Icon d={I.map} c="#0f172a" s={13}/>길찾기
          </button>
        </div>
      </div>

      <div style={{margin:'10px 16px',background:'#fff',borderRadius:14,padding:'14px',border:'1px solid #e5e7eb'}}>
        <div style={{fontSize:11,fontWeight:700,color:'#64748b',letterSpacing:'.04em',textTransform:'uppercase',marginBottom:8}}>설비 정보</div>
        <Row k="저장고" v="냉동 1호기 (3000×4000×2400)"/>
        <Row k="시공일" v="2024.11.08"/>
        <Row k="유닛쿨러" v="대한 DCO-30 · 3HP · 2014.06 설치"/>
        <Row k="냉매" v="R-404A"/>
        <Row k="최근 A/S" v="2025.03 · 팽창변 교체"/>
        <button style={{marginTop:10,width:'100%',height:34,borderRadius:8,background:'#eff4ff',color:'#1e40af',border:'1px solid #c7d6f5',fontSize:12,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',gap:5}}>
          <Icon d={I.list} c="#1e40af" s={13}/>전체 시공 이력
        </button>
      </div>

      <div style={{margin:'10px 16px',background:'#fff',borderRadius:14,padding:'14px',border:'1px solid #e5e7eb'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
          <div style={{fontSize:11,fontWeight:700,color:'#64748b',letterSpacing:'.04em',textTransform:'uppercase'}}>현장 사진</div>
          <span style={{fontSize:11,fontWeight:600,color:'#1e40af'}}>4장</span>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:5}}>
          {[1,2,3,0].map((n,i)=>(
            <div key={i} style={{aspectRatio:'1',borderRadius:8,background:n?'linear-gradient(135deg,#cbd5e1,#94a3b8)':'#f1f5f9',border:'1.5px '+(n?'solid':'dashed')+' #e5e7eb',display:'flex',alignItems:'center',justifyContent:'center'}}>
              {!n && <Icon d={I.camera} c="#94a3b8" s={16}/>}
            </div>
          ))}
        </div>
      </div>

      <div style={{margin:'14px 16px 0',display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
        <button style={{height:46,borderRadius:12,background:'#fff',border:'1px solid #e5e7eb',fontSize:13,fontWeight:700}}>일시 보류</button>
        <button style={{height:46,borderRadius:12,background:'#1e40af',color:'#fff',border:'none',fontSize:13,fontWeight:800,display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
          진단 시작 <Icon d={I.arrow} c="#fff" s={14}/>
        </button>
      </div>
    </div>
  );
}
function Row({k,v}){return(
  <div style={{display:'flex',padding:'4px 0',fontSize:12.5}}>
    <span style={{width:64,color:'#64748b',flexShrink:0,fontSize:11.5}}>{k}</span>
    <span style={{color:'#0f172a',fontWeight:500,flex:1}}>{v}</span>
  </div>
);}

// ─── Diagnosis screen ─────────────────────────────────────
function Diagnose(){
  const [sel,setSel] = React.useState(2);
  const causes = ['센서 불량','히터 단선','타이머 설정','냉매 부족','드레인 막힘'];
  return (
    <div style={{padding:'56px 0 30px',fontFamily:'Pretendard,sans-serif',color:'#0f172a'}}>
      <div style={{padding:'4px 16px 14px',display:'flex',alignItems:'center',gap:8}}>
        <button style={{width:32,height:32,borderRadius:8,background:'rgba(255,255,255,.6)',border:'1px solid rgba(0,0,0,.08)',display:'flex',alignItems:'center',justifyContent:'center'}}>
          <Icon d={I.chevL} c="#0f172a" s={16}/>
        </button>
        <div style={{flex:1}}>
          <div style={{fontSize:13,fontWeight:700}}>진단 · 동해수산</div>
          <div style={{fontSize:10.5,color:'#64748b',marginTop:1}}>2/4 단계</div>
        </div>
        <div style={{display:'flex',gap:3}}>
          {[1,1,0,0].map((a,i)=><div key={i} style={{width:18,height:3,borderRadius:99,background:a?'#1e40af':'#e5e7eb'}}/>)}
        </div>
      </div>

      <div style={{margin:'0 16px',background:'#fff',borderRadius:14,padding:'14px',border:'1px solid #e5e7eb'}}>
        <div style={{fontSize:11,fontWeight:700,color:'#64748b',letterSpacing:'.04em',textTransform:'uppercase',marginBottom:8}}>현장 측정값</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
          <Stat label="고압 PSI" val="245" unit="psi" hl/>
          <Stat label="저압 PSI" val="18" unit="psi"/>
          <Stat label="흡입 온도" val="-18" unit="℃"/>
          <Stat label="토출 온도" val="76" unit="℃" hl/>
        </div>
        <button style={{marginTop:10,width:'100%',height:34,borderRadius:8,background:'#0f172a',color:'#fff',border:'none',fontSize:12,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',gap:5}}>
          <Icon d={I.thermo} c="#fff" s={13}/>실시간 측정 연결
        </button>
      </div>

      <div style={{margin:'10px 16px',background:'#fff',borderRadius:14,padding:'14px',border:'1px solid #e5e7eb'}}>
        <div style={{fontSize:11,fontWeight:700,color:'#64748b',letterSpacing:'.04em',textTransform:'uppercase',marginBottom:8}}>예상 원인</div>
        <div style={{display:'flex',flexDirection:'column',gap:6}}>
          {causes.map((c,i)=>(
            <button key={i} onClick={()=>setSel(i)} style={{
              textAlign:'left',padding:'9px 12px',borderRadius:8,
              border:'1.5px solid '+(sel===i?'#1e40af':'#e5e7eb'),
              background:sel===i?'#eff4ff':'#fff',
              fontSize:13,fontWeight:sel===i?700:500,
              color:sel===i?'#1e40af':'#0f172a',
              display:'flex',alignItems:'center',gap:8
            }}>
              <div style={{width:18,height:18,borderRadius:'50%',border:'2px solid '+(sel===i?'#1e40af':'#cbd5e1'),background:sel===i?'#1e40af':'#fff',display:'flex',alignItems:'center',justifyContent:'center'}}>
                {sel===i && <Icon d={I.check} c="#fff" s={10}/>}
              </div>
              {c}
              {sel===i && <span style={{marginLeft:'auto',fontSize:10,color:'#1e40af',fontWeight:700}}>AI 87%</span>}
            </button>
          ))}
        </div>
      </div>

      <div style={{margin:'10px 16px',background:'#fff',borderRadius:14,padding:'14px',border:'1px solid #e5e7eb'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
          <div style={{fontSize:11,fontWeight:700,color:'#64748b',letterSpacing:'.04em',textTransform:'uppercase'}}>증거 사진</div>
          <span style={{fontSize:11,fontWeight:600,color:'#1e40af'}}>+ 추가</span>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:6}}>
          <div style={{aspectRatio:'1',borderRadius:8,background:'linear-gradient(135deg,#475569,#1e293b)'}}/>
          <div style={{aspectRatio:'1',borderRadius:8,background:'linear-gradient(135deg,#94a3b8,#64748b)'}}/>
          <div style={{aspectRatio:'1',borderRadius:8,background:'#f8fafc',border:'1.5px dashed #cbd5e1',display:'flex',alignItems:'center',justifyContent:'center'}}>
            <Icon d={I.camera} c="#94a3b8" s={18}/>
          </div>
        </div>
      </div>

      <div style={{margin:'14px 16px 0'}}>
        <button style={{width:'100%',height:46,borderRadius:12,background:'#1e40af',color:'#fff',border:'none',fontSize:13.5,fontWeight:800,display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
          수리 · 자재 선택 <Icon d={I.arrow} c="#fff" s={14}/>
        </button>
      </div>
    </div>
  );
}
function Stat({label,val,unit,hl}){return(
  <div style={{padding:'8px 10px',borderRadius:8,background:hl?'#fef2f2':'#f8fafc',border:'1px solid '+(hl?'#fecaca':'#e5e7eb')}}>
    <div style={{fontSize:10,color:hl?'#991b1b':'#64748b',fontWeight:700,letterSpacing:'.04em',textTransform:'uppercase'}}>{label}</div>
    <div style={{fontSize:18,fontWeight:800,color:hl?'#991b1b':'#0f172a',marginTop:1,letterSpacing:'-.01em',fontVariantNumeric:'tabular-nums'}}>
      {val}<span style={{fontSize:10,color:'#94a3b8',fontWeight:600,marginLeft:2}}>{unit}</span>
    </div>
  </div>
);}

// ─── Complete / Sign screen ─────────────────────────────────────
function Complete(){
  return (
    <div style={{padding:'56px 0 30px',fontFamily:'Pretendard,sans-serif',color:'#0f172a'}}>
      <div style={{padding:'4px 16px 14px',display:'flex',alignItems:'center',gap:8}}>
        <button style={{width:32,height:32,borderRadius:8,background:'rgba(255,255,255,.6)',border:'1px solid rgba(0,0,0,.08)',display:'flex',alignItems:'center',justifyContent:'center'}}>
          <Icon d={I.chevL} c="#0f172a" s={16}/>
        </button>
        <div style={{flex:1}}>
          <div style={{fontSize:13,fontWeight:700}}>완료 보고</div>
          <div style={{fontSize:10.5,color:'#64748b',marginTop:1}}>4/4 마지막 단계</div>
        </div>
        <div style={{display:'flex',gap:3}}>
          {[1,1,1,1].map((a,i)=><div key={i} style={{width:18,height:3,borderRadius:99,background:'#1e40af'}}/>)}
        </div>
      </div>

      <div style={{margin:'0 16px',background:'linear-gradient(135deg,#047857,#065f46)',borderRadius:14,padding:'14px',color:'#fff'}}>
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
          <div style={{width:32,height:32,borderRadius:'50%',background:'rgba(255,255,255,.18)',display:'flex',alignItems:'center',justifyContent:'center'}}>
            <Icon d={I.check} c="#fff" s={18}/>
          </div>
          <div>
            <div style={{fontSize:13,fontWeight:800}}>수리 완료</div>
            <div style={{fontSize:11,opacity:.85}}>3시간 22분 소요</div>
          </div>
        </div>
        <div style={{fontSize:11.5,opacity:.9,lineHeight:1.5}}>제상 히터 단선 — 신품 교체. 제상 사이클 정상 동작 확인.</div>
      </div>

      <div style={{margin:'10px 16px',background:'#fff',borderRadius:14,padding:'14px',border:'1px solid #e5e7eb'}}>
        <div style={{fontSize:11,fontWeight:700,color:'#64748b',letterSpacing:'.04em',textTransform:'uppercase',marginBottom:8}}>사용 자재</div>
        <Material n="제상 히터 어셈블리" code="HTR-DCO-30" qty="1식" price="₩145,000"/>
        <Material n="히터 컨트롤 릴레이" code="REL-12V-5A" qty="1ea" price="₩28,000"/>
        <Material n="냉매 R-404A 보충" code="RFG-404A" qty="0.5kg" price="₩42,000"/>
        <div style={{display:'flex',justifyContent:'space-between',marginTop:8,paddingTop:8,borderTop:'1px solid #f1f5f9'}}>
          <span style={{fontSize:11,fontWeight:700,color:'#64748b',letterSpacing:'.04em',textTransform:'uppercase'}}>자재 합계 (출장비 별도)</span>
          <span style={{fontSize:14,fontWeight:800,letterSpacing:'-.01em',fontVariantNumeric:'tabular-nums'}}>₩215,000</span>
        </div>
      </div>

      <div style={{margin:'10px 16px',background:'#fff',borderRadius:14,padding:'14px',border:'1px solid #e5e7eb'}}>
        <div style={{fontSize:11,fontWeight:700,color:'#64748b',letterSpacing:'.04em',textTransform:'uppercase',marginBottom:8}}>고객 확인 서명</div>
        <div style={{height:90,borderRadius:8,border:'1.5px dashed #cbd5e1',background:'#fafbfc',display:'flex',alignItems:'center',justifyContent:'center',position:'relative'}}>

          </svg>
          <div style={{position:'absolute',bottom:6,right:8,fontSize:10,color:'#94a3b8',fontWeight:600}}>이영희 · 14:22</div>
        </div>
        <div style={{display:'flex',gap:6,marginTop:8}}>
          <button style={{flex:1,height:30,borderRadius:6,background:'#f1f5f9',border:'none',fontSize:11.5,fontWeight:600,color:'#475569'}}>다시 받기</button>
          <button style={{flex:2,height:30,borderRadius:6,background:'#0f172a',color:'#fff',border:'none',fontSize:11.5,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',gap:4}}>
            <Icon d={I.sign} c="#fff" s={12}/>서명 완료

      <div style={{margin:'14px 16px 0',display:'grid',gridTemplateColumns:'1fr 1.4fr',gap:8}}>

          본사 전송
        </button>
      </div>
    </div>
  );
}
function Material({n,code,qty,price}){return(
  <div style={{display:'flex',padding:'5px 0',alignItems:'center',gap:8,fontSize:12}}>
    <div style={{flex:1,minWidth:0}}>
      <div style={{fontWeight:600,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{n}</div>
      <div style={{fontSize:10,color:'#94a3b8',fontFamily:'monospace',marginTop:1}}>{code} · {qty}</div>
    </div>
    <div style={{fontWeight:700,fontSize:12,fontVariantNumeric:'tabular-nums'}}>{price}</div>
  </div>
);}

// ─── App ─────────────────────────────────────
function App(){
  return (
    <DesignCanvas title="A/S 기사 모바일 — ColdStorage Master" subtitle="현장 기사용 4-스텝 플로우">
      <DCSection id="flow" title="A/S 기사 플로우" subtitle="작업 리스트 → 상세 → 진단 → 완료 보고">
        <DCArtboard id="list" label="① 오늘 작업" width={402} height={874}>
          <IOSDevice><JobList/></IOSDevice>

        <DCArtboard id="detail" label="② A/S 상세" width={402} height={874}>
          <IOSDevice><JobDetail/></IOSDevice>
        </DCArtboard>
        <DCArtboard id="diag" label="③ 진단" width={402} height={874}>
          <IOSDevice><Diagnose/></IOSDevice>
        </DCArtboard>
        <DCArtboard id="done" label="④ 완료 보고" width={402} height={874}>

}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
