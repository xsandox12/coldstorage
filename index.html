<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>대시보드 — ColdStorage</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
  * { font-family: 'Pretendard', sans-serif; }
  .nav-link { display:flex;align-items:center;gap:10px;padding:8px 14px;border-radius:8px;color:#94a3b8;font-size:13px;font-weight:500;transition:all .15s; }
  .nav-link:hover { background:#334155;color:#e2e8f0; }
  .nav-link.active { background:#1d4ed8;color:#fff; }
  ::-webkit-scrollbar{width:5px} ::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:4px}
  .s-draft{background:#dbeafe;color:#1d4ed8} .s-ordered{background:#ffedd5;color:#c2410c}
  .s-partial{background:#fef9c3;color:#854d0e} .s-shipped{background:#ede9fe;color:#6d28d9} .s-done{background:#dcfce7;color:#15803d}
</style>
</head>
<body class="bg-slate-100 text-slate-800 flex h-screen overflow-hidden">

<aside class="w-52 bg-slate-800 flex flex-col shrink-0">
  <div class="p-4 border-b border-slate-700">
    <div class="text-white font-bold text-sm">❄️ ColdStorage</div>
    <div class="text-slate-400 text-xs mt-0.5">한남냉동테크(주)</div>
  </div>
  <nav class="flex-1 p-3 flex flex-col gap-1 overflow-y-auto">
    <a href="/" class="nav-link active">🏠 대시보드</a>
    <a href="/orders.html" class="nav-link">📋 견적/주문</a>
    <a href="/customers.html" class="nav-link">👤 고객</a>
    <a href="/as.html" class="nav-link">🔧 A/S</a>
    <a href="/payments.html" class="nav-link">💰 입금</a>
    <div class="mt-auto pt-3 border-t border-slate-700">
      <a href="/drawing_app.html" target="_blank" class="nav-link">✏️ 도면 설계 ↗</a>
    </div>
  </nav>
</aside>

<div class="flex-1 flex flex-col overflow-hidden">
  <div class="bg-white border-b border-slate-200 px-6 py-4 flex items-center justify-between">
    <div>
      <h1 class="font-bold text-base">대시보드</h1>
      <div class="text-xs text-slate-400" id="today-label"></div>
    </div>
    <div class="flex gap-2">
      <a href="/orders.html" class="bg-blue-600 text-white text-xs px-3 py-1.5 rounded-lg hover:bg-blue-700">+ 새 견적</a>
      <a href="/as.html" class="bg-orange-500 text-white text-xs px-3 py-1.5 rounded-lg hover:bg-orange-600">🔧 AS 접수</a>
    </div>
  </div>

  <div class="flex-1 overflow-y-auto p-6">
    <!-- KPI -->
    <div class="grid grid-cols-4 gap-4 mb-6">
      <div class="bg-white rounded-xl border border-slate-200 p-4">
        <div class="text-xs text-slate-400 mb-2">이번달 견적</div>
        <div class="text-3xl font-bold text-blue-600" id="k1">—</div>
        <div class="text-xs text-slate-400 mt-1">건</div>
      </div>
      <div class="bg-white rounded-xl border border-slate-200 p-4">
        <div class="text-xs text-slate-400 mb-2">진행중 주문</div>
        <div class="text-3xl font-bold text-orange-500" id="k2">—</div>
        <div class="text-xs text-slate-400 mt-1">건</div>
      </div>
      <div class="bg-white rounded-xl border border-slate-200 p-4">
        <div class="text-xs text-slate-400 mb-2">총 미수금</div>
        <div class="text-2xl font-bold text-red-500" id="k3">—</div>
        <div class="text-xs text-slate-400 mt-1">원</div>
      </div>
      <div class="bg-white rounded-xl border border-slate-200 p-4">
        <div class="text-xs text-slate-400 mb-2">미처리 AS</div>
        <div class="text-3xl font-bold text-purple-600" id="k4">—</div>
        <div class="text-xs text-slate-400 mt-1">건</div>
      </div>
    </div>

    <div class="grid grid-cols-3 gap-4">
      <!-- 워크큐 -->
      <div class="col-span-2 bg-white rounded-xl border border-slate-200">
        <div class="flex items-center justify-between p-4 border-b border-slate-100">
          <span class="font-semibold text-sm">워크큐 — 처리할 항목</span>
          <span class="text-xs text-slate-400" id="wq-count"></span>
        </div>
        <div id="workqueue" class="divide-y divide-slate-50 max-h-96 overflow-y-auto"></div>
      </div>

      <!-- 최근 주문 -->
      <div class="bg-white rounded-xl border border-slate-200">
        <div class="flex items-center justify-between p-4 border-b border-slate-100">
          <span class="font-semibold text-sm">최근 주문</span>
          <a href="/orders.html" class="text-xs text-blue-600 hover:underline">전체 →</a>
        </div>
        <div id="recent-orders" class="divide-y divide-slate-50 max-h-96 overflow-y-auto"></div>
      </div>
    </div>
  </div>
</div>

<script>
const STATUS_LABEL = { draft:'견적', ordered:'주문', partial:'부분출고', shipped:'출고', done:'완료' };
const STATUS_CLS   = { draft:'s-draft', ordered:'s-ordered', partial:'s-partial', shipped:'s-shipped', done:'s-done' };
const WQ_STYLE = {
  '미수금': { icon:'💰', badge:'bg-red-100 text-red-700' },
  'AS':     { icon:'🔧', badge:'bg-orange-100 text-orange-700' },
  '부분출고': { icon:'📦', badge:'bg-yellow-100 text-yellow-700' },
};

async function init() {
  const now = new Date();
  document.getElementById('today-label').textContent =
    now.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'long'});

  const dash = await fetch('/api/dashboard').then(r=>r.json());
  const { kpi, workqueue, recent } = dash;

  document.getElementById('k1').textContent = kpi.thisMonthDraft;
  document.getElementById('k2').textContent = kpi.inProgress;
  document.getElementById('k3').textContent = (kpi.totalUnpaid||0).toLocaleString();
  document.getElementById('k4').textContent = kpi.openAS;

  const wq = document.getElementById('workqueue');
  document.getElementById('wq-count').textContent = `${workqueue.length}건`;
  if (!workqueue.length) {
    wq.innerHTML = '<div class="p-6 text-center text-slate-400 text-sm">처리할 항목이 없습니다 🎉</div>';
  } else {
    wq.innerHTML = workqueue.map(item => {
      const st = WQ_STYLE[item.tag] || WQ_STYLE['미수금'];
      const link = item.tag === 'AS' ? '/as.html' : item.tag === '미수금' ? '/payments.html' : '/orders.html';
      const desc = item.tag === '미수금'
        ? `미수 ${((item.total||0)-(item.total_paid||0)).toLocaleString()}원`
        : item.tag === 'AS' ? (item.issue||'')
        : '부분출고 진행중';
      return `<a href="${link}" class="flex items-center gap-3 p-3 hover:bg-slate-50 ${item.urgency==='EMERGENCY'?'border-l-2 border-red-500':''}">
        <div class="w-8 h-8 rounded-full bg-slate-50 border border-slate-100 flex items-center justify-center text-base shrink-0">${st.icon}</div>
        <div class="flex-1 min-w-0">
          <div class="text-sm font-medium truncate">${item.customer||item.cust_name||'—'}</div>
          <div class="text-xs text-slate-400 truncate">${desc}</div>
        </div>
        <span class="text-xs px-2 py-0.5 rounded-full font-medium ${st.badge} shrink-0">${item.tag}</span>
      </a>`;
    }).join('');
  }

  const ro = document.getElementById('recent-orders');
  if (!recent.length) {
    ro.innerHTML = '<div class="p-6 text-center text-slate-400 text-sm">주문 없음</div>';
  } else {
    ro.innerHTML = recent.map(o => {
      const name = o.cust_name || o.customer || '—';
      const unpaid = (o.total||0) - (o.total_paid||0);
      return `<a href="/orders.html" class="flex items-center gap-3 p-3 hover:bg-slate-50">
        <div class="flex-1 min-w-0">
          <div class="text-sm font-medium truncate">${name}</div>
          <div class="text-xs text-slate-400">${o.no||'#'+o.id} · ${o.date||''}</div>
        </div>
        <div class="text-right shrink-0">
          <div class="text-xs font-semibold">${(o.total||0).toLocaleString()}원</div>
          ${unpaid>0?`<div class="text-xs text-red-500">미수 ${unpaid.toLocaleString()}</div>`:'<div class="text-xs text-green-500">완납</div>'}
          <span class="inline-block text-xs px-1.5 py-0.5 rounded-full font-medium mt-0.5 ${STATUS_CLS[o.order_status]||'s-draft'}">${STATUS_LABEL[o.order_status]||''}</span>
        </div>
      </a>`;
    }).join('');
  }
}

init();
</script>
</body>
</html>
